# =============================================================================
# Evaluation Scenarios
# =============================================================================
#
# 23 infographic test scenarios used by the evaluation harness.
#
# Organized into three prompt tiers that mirror real user behavior:
#
#   SPECIFIED  -- Full visual spec (colors, panel count, aspect ratio).
#                 Tests generation quality under precise instructions.
#   NATURAL    -- Conversational request with topic detail but no visual spec.
#                 Agent decides panel count, layout, and aesthetic.
#   AESTHETIC  -- Names a curated aesthetic from the style guide.
#                 Tests step 3d template loading + named aesthetic rendering.
#
# Each scenario has:
#   name            -- unique slug identifier
#   topic           -- human-readable title
#   panels          -- expected panel count (agent may choose differently
#                      for natural/aesthetic prompts; scoring uses actual
#                      image count, not this field)
#   audience        -- intended target audience
#   style_direction -- visual style (or "Agent-selected" for natural prompts)
#   prompt          -- full generation prompt passed to the infographic builder
#
# =============================================================================

scenarios:

  # ===========================================================================
  # SPECIFIED -- Full visual spec in prompt (11 scenarios)
  # ===========================================================================
  #
  # These prompts include panel count, color palette, and aspect ratio.
  # They test generation quality under precise, pre-decomposed instructions.
  # ---------------------------------------------------------------------------

  # ---- 1-panel (3) ----------------------------------------------------------

  - name: mechanical-keyboard
    topic: "The Anatomy of a Mechanical Keyboard"
    panels: 1
    audience: "Tech enthusiasts and hardware hobbyists"
    style_direction: "Dark background with RGB color accents (red, green, blue, purple), bold sans-serif headers"
    prompt: >
      Create a single-panel infographic about "The Anatomy of a Mechanical Keyboard".
      Show the key switch mechanism (spring, stem, housing), keycap layers, PCB,
      stabilizers, and plate mount. Use an exploded diagram layout. Dark background
      with RGB color accents (red, green, blue, purple). Bold sans-serif headers,
      9:16 aspect ratio.

  - name: noise-canceling-headphones
    topic: "How Noise-Canceling Headphones Work"
    panels: 1
    audience: "General consumer / everyday tech users"
    style_direction: "Clean minimal, light gray background, blue and dark gray palette"
    prompt: >
      Create a single-panel infographic about "How Noise-Canceling Headphones Work".
      Show ambient sound waves, microphone pickup, anti-phase wave generation, and
      combined output (silence). Use a horizontal flow diagram showing the wave
      cancellation process. Clean minimal style with a light gray background, blue
      and dark gray palette. 9:16 aspect ratio.

  - name: saas-metrics-dashboard
    topic: "Q3 2025 SaaS Metrics Dashboard"
    panels: 1
    audience: "SaaS executives and business stakeholders"
    style_direction: "Clean corporate, navy blue and emerald green on white, accent gold for positive trends"
    prompt: >
      Create a single-panel infographic about "Q3 2025 SaaS Metrics Dashboard".
      Present these specific KPIs with large prominent numbers and supporting
      context: Monthly Recurring Revenue $4.2M (up 23% from Q2), Customer
      Churn Rate 2.3% (down from 3.1%), Customer Acquisition Cost $142 (target
      was $150), Net Promoter Score 72 (industry avg 41), Active Users 28,400
      (up 3,200 from Q2). Use a statistics/KPI layout with large numbers and
      icons. Clean corporate style with navy blue and emerald green on white
      background, accent gold for positive trends. 9:16 aspect ratio.

  # ---- 2-panel (1) ----------------------------------------------------------

  - name: developer-survey-results
    topic: "2025 Developer Survey Results"
    panels: 2
    audience: "Software developers and engineers"
    style_direction: "Modern tech, electric blue and cool gray on dark background, white text, clean sans-serif"
    prompt: >
      Create a 2-panel infographic about "2025 Developer Survey Results"
      presenting survey data with specific percentages and rankings.
      Panel 1 "Languages & Frameworks": Top 5 languages by usage --
      Python 68%, JavaScript 62%, TypeScript 51%, Go 29%, Rust 18%.
      Framework satisfaction scores -- React 4.1/5, Next.js 4.3/5,
      FastAPI 4.5/5, Django 3.9/5, Express 3.7/5.
      Panel 2 "Career & Compensation": Median salary by role -- Senior
      Engineer $185K, Staff Engineer $225K, Engineering Manager $210K,
      Principal Engineer $260K. Remote work breakdown -- Fully remote 42%,
      Hybrid 38%, In-office 20%. Job satisfaction 73% positive.
      Use a statistics layout with large numbers, ranking bars, and percentage
      callouts. Modern tech style with electric blue and cool gray on dark
      background, white text, clean sans-serif. 9:16 aspect ratio.

  # ---- 3-panel (2) ----------------------------------------------------------

  - name: neural-networks
    topic: "How Neural Networks Learn"
    panels: 3
    audience: "AI/ML learners and technical practitioners"
    style_direction: "Technical diagram, gradient blues and purples on dark background, glowing node connections"
    prompt: >
      Create a 3-panel infographic about "How Neural Networks Learn".
      Panel 1 "Forward Pass": input data flows through layers (input -> hidden ->
      output), weights multiply signals, activation functions fire.
      Panel 2 "Backpropagation": error calculated at output, gradients flow backwards
      through the network, chain rule applies layer by layer.
      Panel 3 "Gradient Descent": weights updated to minimize loss, learning rate
      controls step size, training loop repeats until convergence.
      Technical diagram style with gradient blues and purples on a dark background,
      glowing node connections. 9:16 aspect ratio.

  - name: cicd-pipeline
    topic: "CI/CD Pipeline: From Commit to Production"
    panels: 3
    audience: "Microsoft incubation teams and software engineers"
    style_direction: "Technical dark theme, green and teal accents on near-black background, pipeline flow diagram"
    prompt: >
      Create a 3-panel infographic about "CI/CD Pipeline: From Commit to Production".
      Panel 1 "Continuous Integration": developer commits trigger automated pipeline,
      build compilation and dependency resolution, unit and integration test suites,
      code quality gates (linting, type checking, coverage thresholds), and artifact
      creation on success.
      Panel 2 "Continuous Delivery": artifact packaging and versioning, staging
      environment deployment, automated smoke and regression tests, performance
      benchmarks, and release candidate approval gates (manual sign-off).
      Panel 3 "Continuous Deployment": production rollout strategies (blue-green,
      canary with traffic percentages, feature flags), health monitoring with
      automatic rollback triggers, observability dashboards (error rate, latency,
      saturation), and post-deployment validation.
      Technical dark theme with green and teal accents on a near-black background,
      pipeline flow diagram with stage boxes and connector arrows. 9:16 aspect ratio.

  # ---- 4-panel (2) ----------------------------------------------------------

  - name: llm-pipeline
    topic: "The LLM Training Pipeline"
    panels: 4
    audience: "AI/ML practitioners and developers"
    style_direction: "Dark navy neon, electric blue and cyan with purple accents and amber highlights"
    prompt: >
      Create a 4-panel infographic about "The LLM Training Pipeline".
      Panel 1 "Pre-training": next-token prediction on trillions of tokens,
      self-supervised, thousands of GPUs, costs $2M-$100M+.
      Panel 2 "Supervised Fine-Tuning": 10K-100K instruction-response pairs, human
      expert annotators, task alignment.
      Panel 3 "RLHF & Alignment": human preference ranking, reward model training,
      PPO optimization loop, goal of helpful/harmless/honest.
      Panel 4 "Evaluation & Deployment": benchmarks (MMLU, HumanEval), red-teaming,
      API serving, monitoring, continuous feedback.
      Dark navy neon style with electric blue, cyan, purple accents and amber
      highlights. 9:16 aspect ratio.

  - name: song-to-spotify
    topic: "How a Song Goes from Idea to Spotify"
    panels: 4
    audience: "Music creators and general audience"
    style_direction: "Creative music, warm purple and gold on dark background, vinyl and waveform visual motifs"
    prompt: >
      Create a 4-panel infographic about "How a Song Goes from Idea to Spotify".
      Panel 1 "Songwriting": melody creation, lyric writing, chord progressions,
      demo recording.
      Panel 2 "Recording": studio session, instrument tracking, vocal takes,
      DAW editing.
      Panel 3 "Mixing & Mastering": EQ balancing, compression, spatial effects,
      loudness optimization for streaming.
      Panel 4 "Distribution": digital aggregators (DistroKid, TuneCore), streaming
      platform delivery, royalty splits, playlist placement.
      Creative music style with warm purple and gold palette on a dark background,
      vinyl/waveform visual motifs. 9:16 aspect ratio.

  # ---- 5-panel (2) ----------------------------------------------------------

  - name: ai-everyday-life
    topic: "AI in Everyday Life"
    panels: 5
    audience: "General public and non-technical users"
    style_direction: "Friendly modern, bright blues and greens on white background, rounded icons, approachable feel"
    prompt: >
      Create a 5-panel infographic about "AI in Everyday Life".
      Panel 1 "Recommendations": Netflix, Spotify, shopping algorithms --
      collaborative filtering and content-based matching.
      Panel 2 "Voice Assistants": speech recognition, natural language understanding,
      intent classification, response generation.
      Panel 3 "Navigation": real-time traffic prediction, route optimization, ETA
      estimation, map data fusion.
      Panel 4 "Healthcare": medical imaging analysis, drug discovery acceleration,
      clinical decision support.
      Panel 5 "Creative Tools": image generation, writing assistants, code
      completion, music composition.
      Friendly modern style with bright blues and greens on a white background,
      rounded icons, approachable feel. 9:16 aspect ratio.

  - name: coffee-bean
    topic: "The Life of a Coffee Bean"
    panels: 5
    audience: "Coffee enthusiasts and general audience"
    style_direction: "Warm earthy, rich browns, cream, and forest greens on light parchment background, illustrated feel"
    prompt: >
      Create a 5-panel infographic about "The Life of a Coffee Bean".
      Panel 1 "Growing": coffee belt regions, cherry development on the branch,
      altitude and shade impact on flavor.
      Panel 2 "Harvesting & Processing": hand-picking vs strip-picking, washed vs
      natural vs honey processing methods.
      Panel 3 "Roasting": green bean transformation, Maillard reaction, first crack,
      roast profiles (light/medium/dark).
      Panel 4 "Brewing": grind size spectrum, water temperature, extraction time,
      brew methods (espresso, pour-over, French press).
      Panel 5 "The Cup": flavor wheel, tasting notes (acidity, body, sweetness),
      single-origin vs blend characteristics.
      Warm earthy style with rich browns, cream, and forest greens on a light
      parchment background, illustrated feel. 9:16 aspect ratio.

  # ---- 6-panel (1) ----------------------------------------------------------

  - name: history-of-internet
    topic: "History of the Internet"
    panels: 6
    audience: "General public and tech history enthusiasts"
    style_direction: "Timeline, retro-to-modern color progression from muted greens/ambers to vibrant blues/purples"
    prompt: >
      Create a 6-panel infographic about "History of the Internet".
      Panel 1 "ARPANET (1960s-70s)": packet switching invention, first 4 nodes,
      military origins.
      Panel 2 "Protocols & Email (1980s)": TCP/IP standardization, SMTP email, DNS
      introduced, NSFNet backbone.
      Panel 3 "The World Wide Web (1990s)": Tim Berners-Lee, HTML/HTTP,
      Mosaic/Netscape browsers, dotcom boom.
      Panel 4 "Web 2.0 (2000s)": social media explosion, user-generated content,
      Ajax/dynamic web, Google/Facebook/YouTube.
      Panel 5 "Mobile & Cloud (2010s)": smartphone revolution, app economy,
      AWS/cloud computing, streaming services.
      Panel 6 "AI & Beyond (2020s)": large language models, edge computing, IoT,
      decentralized web.
      Timeline style with a retro-to-modern color progression -- muted greens/ambers
      in early panels transitioning to vibrant blues/purples in later panels.
      9:16 aspect ratio.

  # ===========================================================================
  # NATURAL -- Conversational prompts, lightweight style hint (6 scenarios)
  # ===========================================================================
  #
  # These read like what a real user would type.  No panel count, no colors,
  # no aspect ratio.  The agent decides layout and decomposition.  Each
  # prompt includes a brief style preference (the way a real user might
  # casually mention "keep it clean" or "something dark and techy") so the
  # agent can skip the interactive aesthetic menu in batch eval.
  # ---------------------------------------------------------------------------

  - name: dns
    topic: "How DNS Works"
    panels: 2
    audience: "Junior developers and technical learners"
    style_direction: "User-hinted: clean and technical"
    prompt: >
      How does DNS work? I want an infographic I can use to explain the full
      lookup process to junior developers on my team. Keep it clean and
      technical looking.

  - name: campfire
    topic: "The Science Behind a Perfect Campfire"
    panels: 2
    audience: "Outdoor enthusiasts and general audience"
    style_direction: "User-hinted: warm and illustrated"
    prompt: >
      Make an infographic about building the perfect campfire. Cover both the
      science behind combustion and the practical fire-building technique.
      Go for a warm, illustrated feel.

  - name: agile-vs-waterfall
    topic: "Agile vs Waterfall"
    panels: 2
    audience: "Non-technical stakeholders and project managers"
    style_direction: "User-hinted: clean and corporate"
    prompt: >
      I need to explain agile vs waterfall to non-technical stakeholders.
      Can you make a comparison infographic? Something clean and corporate
      I can put in a slide deck.

  - name: okr-cascade
    topic: "OKR Cascade: From Company to Team"
    panels: 2
    audience: "Microsoft incubation teams and program managers"
    style_direction: "User-hinted: professional Microsoft style"
    prompt: >
      Help me create an infographic showing how company-level OKRs cascade
      down to team OKRs. It's for program managers at Microsoft. Keep it
      professional and on-brand.

  - name: customer-discovery-funnel
    topic: "Customer Discovery Funnel for New Ventures"
    panels: 2
    audience: "Microsoft incubation teams and startup founders"
    style_direction: "User-hinted: modern startup feel"
    prompt: >
      Make an infographic about customer discovery for early-stage startups.
      Cover both problem validation and solution validation. Modern startup
      vibe.

  - name: photosynthesis
    topic: "How Photosynthesis Works"
    panels: 2
    audience: "Students and general audience"
    style_direction: "User-hinted: bright and friendly"
    prompt: >
      Make an infographic explaining how photosynthesis works. Something
      bright and friendly that would work in a classroom.

  # ===========================================================================
  # AESTHETIC -- Named curated aesthetic from the style guide (6 scenarios)
  # ===========================================================================
  #
  # Each prompt names a curated aesthetic (step 3d) but does NOT specify
  # colors, fonts, or panel decomposition.  Tests that the agent loads
  # the aesthetic template and applies it correctly.
  # ---------------------------------------------------------------------------

  - name: surfing
    topic: "What Happens When You Drop Into a Wave"
    panels: 3
    audience: "Surfing enthusiasts and outdoor sports fans"
    style_direction: "Bold Editorial (named aesthetic)"
    prompt: >
      Make a Bold Editorial infographic about what happens when you drop into
      a wave. Cover the paddle, the pop-up, and the ride.

  - name: incubation-lifecycle
    topic: "Microsoft Incubation Lifecycle"
    panels: 3
    audience: "Microsoft incubation teams and innovation leaders"
    style_direction: "Clean Minimalist (named aesthetic)"
    prompt: >
      Create a Clean Minimalist infographic about the Microsoft incubation
      lifecycle -- from Explore through Incubate to Scale. Include the stage
      gates and key metrics at each phase.

  - name: devops-lifecycle
    topic: "The DevOps Infinite Loop"
    panels: 1
    audience: "Software engineers and DevOps practitioners"
    style_direction: "Claymation Studio (named aesthetic)"
    prompt: >
      Create a Claymation Studio infographic showing the DevOps infinite loop:
      plan, code, build, test, release, deploy, operate, monitor.

  - name: sleep-stages
    topic: "Why Sleep Matters"
    panels: 2
    audience: "General public and wellness readers"
    style_direction: "Hand-Drawn Sketchnote (named aesthetic)"
    prompt: >
      Make a Hand-Drawn Sketchnote infographic about why sleep matters and
      what happens during each stage of sleep. Something I could hang in a
      doctor's waiting room.

  - name: solar-system
    topic: "A Tour of the Solar System"
    panels: 3
    audience: "Students and space enthusiasts"
    style_direction: "Lego Brick Builder (named aesthetic)"
    prompt: >
      Create a Lego Brick Builder infographic touring the solar system. Cover
      the inner rocky planets, the outer gas giants, and the dwarf planets
      and other objects beyond Neptune.

  - name: eisenhower-matrix
    topic: "The Eisenhower Matrix"
    panels: 1
    audience: "Knowledge workers and productivity enthusiasts"
    style_direction: "Dark Mode Tech (named aesthetic)"
    prompt: >
      Create a Dark Mode Tech infographic about the Eisenhower Matrix for
      prioritizing tasks. Show the urgent/important grid with real-world
      examples in each quadrant.

  # ===========================================================================
  # README SHOWCASE SCENARIOS -- prompts drawn from the README examples section
  # ===========================================================================
  #
  # These reproduce scenarios shown or described in the project README to keep
  # the eval set aligned with documented usage patterns.
  # ---------------------------------------------------------------------------

  # ---- NATURAL (agent decides layout and panel count) -----------------------

  - name: engineering-onboarding
    topic: "New Engineer Onboarding Guide"
    panels: 3
    audience: "Software engineers on day one of a new role"
    style_direction: "Agent-selected"
    prompt: >
      Create an onboarding guide infographic for new engineers joining a modern
      software team. Cover three areas: (1) Repository structure -- how the
      codebase is organized, key directories, where tests and configs live.
      (2) Development workflow -- branching strategy, PR process, review
      expectations, CI/CD pipeline overview. (3) Team conventions -- commit
      message format, code style guide, how to ask for help, on-call rotation.
      Make it practical and scannable, aimed at engineers on day one who need
      a single reference they can pin up or bookmark.

  # ---- AESTHETIC (named aesthetic + diorama mode) ---------------------------

  - name: espresso-brewing-diorama
    topic: "A Claymation Diorama Guide to Brewing the Perfect Espresso"
    panels: 1
    audience: "Coffee enthusiasts and home baristas"
    style_direction: "Claymation Studio diorama mode"
    prompt: >
      Make a Claymation Studio diorama infographic -- clay figures acting out
      each step in a physical scene -- showing how to brew the perfect espresso.
      Steps: grind fresh beans fine, dose 18g into the portafilter, tamp evenly
      at 30lbs of pressure, lock and pull for 25-30 seconds, check the crema
      (deep amber means success). Clay barista figures, kitchen workstation props,
      warm lighting, playful tactile mood.

  - name: star-wars-ranking
    topic: "Every Star Wars Movie, Ranked"
    panels: 2
    audience: "Star Wars fans and pop culture enthusiasts"
    style_direction: "Bold Editorial (named aesthetic)"
    prompt: >
      Create a Bold Editorial infographic ranking every Star Wars theatrical film
      from best to worst based on critical reception and fan sentiment. Cover all
      11 films: A New Hope, The Empire Strikes Back, Return of the Jedi, The
      Phantom Menace, Attack of the Clones, Revenge of the Sith, The Force
      Awakens, The Last Jedi, The Rise of Skywalker, Rogue One, Solo. For each
      show rank position, approximate Rotten Tomatoes score, and a one-line
      verdict. Bold Editorial style -- dramatic typography, high contrast,
      cinematic composition.

  # ===========================================================================
  # MATERIALISTIC 3D -- tests diorama and 3D rendering capabilities (2 scenarios)
  # ===========================================================================

  - name: kubernetes-architecture-3d
    topic: "Kubernetes Cluster Architecture -- Materialistic 3D"
    panels: 1
    audience: "Platform engineers and DevOps teams"
    style_direction: "Materialistic 3D diorama with glossy plastic components and soft studio lighting"
    prompt: >
      Create a 1-panel infographic visualizing Kubernetes cluster architecture
      in a materialistic 3D style. Render each component as a glossy 3D physical
      object: Control Plane (API Server, etcd, Scheduler, Controller Manager) as
      a sleek glass platform floating above; Worker Nodes as metallic plastic
      server blocks below; Pods as small rounded capsules docked on nodes;
      Services as glowing connector bridges spanning nodes. Dark studio
      background, soft ambient lighting, saturated accent colors differentiating
      component types, bold modern typography for labels. 9:16 aspect ratio.

  - name: data-pipeline-materialistic-3d
    topic: "Modern Data Pipeline -- Materialistic 3D"
    panels: 1
    audience: "Data engineers and analytics teams"
    style_direction: "Materialistic 3D with glossy pipeline stages and neon data flow effects"
    prompt: >
      Create a 1-panel infographic of a modern data pipeline in materialistic 3D
      style. Render 5 stages as physical glossy 3D platforms connected by glowing
      neon data streams: Ingest (Kafka/Kinesis -- metallic funnel), Store (Data
      Lake -- crystalline ice block), Process (Spark/dbt -- glowing compute
      cluster), Serve (Data Warehouse -- polished mirror-finish surface), Consume
      (BI Tools -- floating display screens). Dark background, dramatic downward
      studio lighting, each stage a distinct saturated accent color. 9:16 aspect
      ratio.

  # ===========================================================================
  # REFERENCE IMAGE -- tests user-provided style anchor capability (2 scenarios)
  # ===========================================================================
  #
  # These scenarios include a reference image path in the prompt. The agent
  # should detect the path, load the image, and use it as reference_image_path
  # when calling nano-banana. Validates the image-input feature end-to-end.
  #
  # Reference images are from infographics/ (generated samples that exist on disk).
  # ---------------------------------------------------------------------------

  - name: amplifier-delegation-styled
    topic: "Amplifier Agent Delegation and Context Sink Pattern"
    panels: 1
    audience: "Amplifier developers and AI engineers"
    style_direction: "Match style of reference image (Dark Mode Tech)"
    prompt: >
      Using './infographics/code-analysis-dark-tech.png' as a visual style
      reference -- match this image's color palette, typography, layout density,
      and dark tech aesthetic exactly -- create a 1-panel infographic explaining
      Amplifier's agent delegation pattern. Show: (1) Root session delegates to
      specialist expert agent, spending only ~50 tokens in root context. (2)
      Expert agent spawns in its own context window, loads @mentioned docs
      (8,000+ tokens), runs full orchestrator loop (20,000+ tokens consumed in
      agent context). (3) Only a ~500 token summary returns to root. Include the
      token math showing why delegation preserves session longevity. 9:16 aspect
      ratio.

  - name: product-metrics-watercolor
    topic: "SaaS Product Health Dashboard -- Watercolor Style"
    panels: 1
    audience: "Product managers and startup founders"
    style_direction: "Match style of reference image (watercolor illustration)"
    prompt: >
      Using './infographics/redwood-run-watercolor.png' as a visual style
      reference -- match this image's watercolor illustration aesthetic, soft
      color washes, organic shapes, and hand-painted feel exactly -- create a
      1-panel product health dashboard infographic. Present these metrics with
      watercolor data visualizations: Monthly Active Users 14,200 (up 18% MoM),
      Activation Rate 62% (target 70%), Day-30 Retention 34%, Net Promoter Score
      58 (industry avg 32), Average Revenue Per User $28/mo. Soft watercolor
      charts and icons, pastel tones with subtle ink outlines. 9:16 aspect ratio.

  # ===========================================================================
  # LIVE DATA -- scenarios that fetch from real repos at eval time (2 scenarios)
  # ===========================================================================
  #
  # These pass GitHub URLs to the agent and ask it to synthesize an infographic
  # from data it fetches live: repo architecture from README/code, recent commits
  # from git history. Tests the full pipeline from data gathering to visual output.
  #
  # Note: content accuracy scoring will vary run-to-run as repos evolve. The
  # primary signal is visual quality and layout coherence, not factual precision.
  # ---------------------------------------------------------------------------

  - name: amplifier-repo-architecture
    topic: "Amplifier AI Agent Framework -- Repository Architecture"
    panels: 2
    audience: "Developers evaluating whether to build on Amplifier"
    style_direction: "Agent-selected"
    prompt: >
      Browse https://github.com/microsoft/amplifier and create an infographic
      explaining the architecture of the Amplifier AI agent framework. Cover the
      key layers: (1) the kernel (amplifier-core -- tiny stable center, session
      lifecycle, module loading, event system, ~2,600 lines), (2) the 5 module
      types and what each does (Provider, Tool, Orchestrator, Context, Hook --
      distinguish LLM-decided vs code-decided), (3) the Foundation library and
      bundle composition system, (4) how agents and recipes sit on top as
      application-layer patterns. Show the dependency hierarchy and the core
      design principle: mechanism not policy, the center stays still so the
      edges can move fast.

  - name: infographic-builder-recent-changes
    topic: "infographic-builder -- What Changed in the Last Week"
    panels: 2
    audience: "Project contributors and power users tracking new capabilities"
    style_direction: "Agent-selected"
    prompt: >
      Fetch the last week of commits from https://github.com/singh2/infographic-builder
      (or run git log locally -- you are inside this repo) and create an infographic
      summarizing what changed. Group commits by theme: new features added, quality
      improvements, test coverage changes, documentation updates. For each theme
      call out the most significant change in plain language. Show the overall
      direction of development and what capabilities are new or improved. Use a
      changelog, timeline, or grouped-cards layout -- whichever fits the commit
      density best.
