# =============================================================================
# Evaluate Infographic Quality
# =============================================================================
#
# Full evaluation pipeline that:
#   1. Creates a timestamped output directory under eval-results/
#   2. Loads evaluation scenarios from eval/scenarios.yaml
#   3. Generates infographics for every scenario via the infographic-builder agent
#   4. Scores each generated infographic using the rubric-based evaluator
#   5. Aggregates all scores into a markdown summary report
#
# Usage:
#   amplifier run "execute recipes/evaluate.yaml"
#
# Prerequisites:
#   - OPENAI_API_KEY environment variable set
#   - pip install -e '.[dev]'
#
# Output:
#   eval-results/<timestamp>/<scenario_name>/panel_*.png  — generated images
#   eval-results/<timestamp>/<scenario_name>/*_scores.json — per-scenario scores
#   eval-results/<timestamp>/summary.md                   — aggregated report
#
# =============================================================================
# CHANGELOG
# =============================================================================
#
# v1.0.0 (2026-03-24):
#   - NEW FEATURE: Initial evaluation pipeline recipe
#     * setup: creates timestamped eval-results directory
#     * load-scenarios: loads eval/scenarios.yaml into recipe context
#     * generate-infographics: foreach over scenarios, delegates to builder agent
#     * evaluate-scenarios: foreach over scenarios, scores PNG images with rubric
#     * generate-report: aggregates *_scores.json files into summary.md
#
# =============================================================================

name: "evaluate-infographic-quality"
description: "Full evaluation pipeline: generate infographics for every scenario, score them with the rubric, and produce a summary report"
version: "1.0.0"
tags: ["evaluation", "quality", "rubric", "batch"]

context:
  scenarios_file: "eval/scenarios.yaml"

steps:
  # ---------------------------------------------------------------------------
  # Step 1: Create a timestamped run directory
  # ---------------------------------------------------------------------------
  - id: "setup"
    type: "bash"
    command: >
      RUN_DIR="eval-results/$(date +%Y-%m-%d_%H%M%S)" &&
      mkdir -p "$RUN_DIR" &&
      echo "$RUN_DIR"
    output: "run_dir"

  # ---------------------------------------------------------------------------
  # Step 2: Load scenarios YAML and emit as JSON for downstream steps
  # ---------------------------------------------------------------------------
  - id: "load-scenarios"
    type: "bash"
    command: >
      python3 -c "
      import yaml, json, sys;
      data = yaml.safe_load(open('{{scenarios_file}}'));
      print(json.dumps(data['scenarios']))
      "
    output: "scenarios"

  # ---------------------------------------------------------------------------
  # Step 3: Generate infographics for every scenario
  #
  # For each scenario we:
  #   • Create the scenario output subdirectory
  #   • Delegate to the infographic-builder agent, instructing it to save
  #     all panel images into {{run_dir}}/{{scenario.name}}/
  # ---------------------------------------------------------------------------
  - id: "generate-infographics"
    foreach: "{{scenarios}}"
    as: "scenario"
    agent: "infographic-builder:infographic-builder"
    prompt: |
      Create the output directory {{run_dir}}/{{scenario.name}}/ before saving any images.

      {{scenario.prompt}}

      IMPORTANT: Save all panel images to {{run_dir}}/{{scenario.name}}/ instead of any
      path mentioned in the prompt above. Name them panel_1.png, panel_2.png, etc.
    timeout: 1800
    on_error: "continue"

  # ---------------------------------------------------------------------------
  # Step 4: Score each scenario against the evaluation rubric
  #
  # For each scenario we:
  #   • Check that PNG files were actually generated (skip if none)
  #   • Run `python -m eval evaluate` to produce a *_scores.json file
  # ---------------------------------------------------------------------------
  - id: "evaluate-scenarios"
    foreach: "{{scenarios}}"
    as: "scenario"
    type: "bash"
    command: |
      SCENARIO_DIR="{{run_dir}}/{{scenario.name}}"
      PNG_COUNT=$(ls "$SCENARIO_DIR"/*.png 2>/dev/null | wc -l | tr -d ' ')
      if [ "$PNG_COUNT" -eq 0 ]; then
        echo "No PNG files found in $SCENARIO_DIR — skipping evaluation for {{scenario.name}}"
        exit 0
      fi
      python -m eval evaluate \
        --scenario-file "{{scenarios_file}}" \
        --scenario-name "{{scenario.name}}" \
        --image-dir "$SCENARIO_DIR" \
        --output "$SCENARIO_DIR/{{scenario.name}}_scores.json"
    on_error: "continue"
    timeout: 120

  # ---------------------------------------------------------------------------
  # Step 5: Aggregate all score files into a markdown summary report
  # ---------------------------------------------------------------------------
  - id: "generate-report"
    type: "bash"
    command: >
      python -m eval report --run-dir {{run_dir}}
