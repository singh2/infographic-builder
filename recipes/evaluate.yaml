# =============================================================================
# Evaluate Infographic Quality
# =============================================================================
#
# Full evaluation pipeline that:
#   1. Creates a timestamped output directory under eval-results/
#   2. Loads evaluation scenarios from eval/scenarios.yaml
#   3. For each scenario: generates infographics, then scores them
#   4. Aggregates all scores into a markdown summary report
#
# The recipe controls output paths directly -- each scenario's images are
# saved into eval-results/<run>/<scenario_name>/ by injecting the save path
# into the generation prompt. No filesystem snapshotting or file discovery.
#
# Usage:
#   amplifier run "execute recipes/evaluate.yaml"
#
# Prerequisites:
#   - OPENAI_API_KEY environment variable set
#   - pip install -e '.[dev]'
#
# Output:
#   eval-results/<timestamp>/<scenario_name>/panel_*.png  -- generated images
#   eval-results/<timestamp>/<scenario_name>/*_scores.json -- per-scenario scores
#   eval-results/<timestamp>/summary.md                   -- aggregated report
#
# =============================================================================

name: "evaluate-infographic-quality"
description: "Full evaluation pipeline: generate infographics for every scenario, score them with the rubric, and produce a summary report"
version: "2.0.0"
tags: ["evaluation", "quality", "rubric", "batch"]

context:
  scenarios_file: "eval/scenarios.yaml"
  run_suffix: ""

steps:
  # ---------------------------------------------------------------------------
  # Step 1: Create a timestamped run directory
  # ---------------------------------------------------------------------------
  - id: "setup"
    type: "bash"
    command: >
      SUFFIX="{{run_suffix}}" &&
      RUN_DIR="eval-results/$(date +%Y-%m-%d_%H%M%S)${SUFFIX:+-$SUFFIX}" &&
      mkdir -p "$RUN_DIR" &&
      printf "%s" "$RUN_DIR"
    output: "run_dir"

  # ---------------------------------------------------------------------------
  # Step 2: Load scenarios YAML and emit as JSON for downstream steps
  # ---------------------------------------------------------------------------
  - id: "load-scenarios"
    type: "bash"
    command: >
      python3 -c "
      import yaml, json, sys;
      data = yaml.safe_load(open('{{scenarios_file}}'));
      print(json.dumps(data['scenarios']))
      "
    output: "scenarios"

  # ---------------------------------------------------------------------------
  # Step 3: Generate infographics -- one scenario at a time
  #
  # The recipe creates the output directory and tells the agent exactly
  # where to save. Scenario prompts contain no save paths -- the recipe
  # is the sole authority on output location.
  # ---------------------------------------------------------------------------
  - id: "generate-infographics"
    foreach: "{{scenarios}}"
    as: "scenario"
    steps:
      - id: "create-scenario-dir"
        type: "bash"
        command: >
          mkdir -p "{{run_dir}}/{{scenario.name}}" &&
          printf "%s" "{{run_dir}}/{{scenario.name}}"

      - id: "generate"
        agent: "infographic-builder:infographic-builder"
        prompt: |
          {{scenario.prompt}}

          OUTPUT PATH: Save all generated images into the directory {{run_dir}}/{{scenario.name}}/ using the filename prefix {{scenario.name}}. For example:
          - Single panel: {{run_dir}}/{{scenario.name}}/{{scenario.name}}.png
          - Multi-panel: {{run_dir}}/{{scenario.name}}/{{scenario.name}}_panel_1.png, {{run_dir}}/{{scenario.name}}/{{scenario.name}}_panel_2.png, etc.
        timeout: 1800
        on_error: "continue"

      - id: "verify"
        type: "bash"
        command: |
          SCENARIO_DIR="{{run_dir}}/{{scenario.name}}"
          PNG_COUNT=$(find "$SCENARIO_DIR" -name "*.png" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$PNG_COUNT" -eq 0 ]; then
            echo "FAILED: No images generated for {{scenario.name}} in $SCENARIO_DIR" >&2
            exit 1
          else
            echo "OK: {{scenario.name}} -- $PNG_COUNT image(s) in $SCENARIO_DIR"
          fi
        on_error: "continue"

  # ---------------------------------------------------------------------------
  # Step 4: Score each scenario against the evaluation rubric
  # ---------------------------------------------------------------------------
  - id: "evaluate-scenarios"
    foreach: "{{scenarios}}"
    as: "scenario"
    type: "bash"
    command: |
      SCENARIO_DIR="{{run_dir}}/{{scenario.name}}"
      PNG_COUNT=$(find "$SCENARIO_DIR" -name "*.png" 2>/dev/null | wc -l | tr -d ' ')
      if [ "$PNG_COUNT" -eq 0 ]; then
        echo "FAILED: No PNG files in $SCENARIO_DIR for {{scenario.name}} -- cannot score" >&2
        exit 1
      fi
      python3 -m eval evaluate \
        --scenario-file "{{scenarios_file}}" \
        --scenario-name "{{scenario.name}}" \
        --image-dir "$SCENARIO_DIR" \
        --output "$SCENARIO_DIR/{{scenario.name}}_scores.json"
    on_error: "continue"
    timeout: 120

  # ---------------------------------------------------------------------------
  # Step 5: Aggregate all score files into a markdown summary report
  # ---------------------------------------------------------------------------
  - id: "generate-report"
    type: "bash"
    command: >
      python3 -m eval report --run-dir {{run_dir}}
